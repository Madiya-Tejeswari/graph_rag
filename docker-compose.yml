version: '3.8'

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15
    container_name: pge-neo4j
    hostname: pge-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      # Memory settings
      dbms_memory_heap_initial__size: 2G
      dbms_memory_heap_max__size: 4G
      dbms_memory_pagecache_size: 2G
    ports:
      - "7687:7687"    # Bolt
      - "7474:7474"    # HTTP
      - "7473:7473"    # HTTPS
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    networks:
      - pge-network
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PG&E GraphRAG Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pge-graphrag-api
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: pge_rag
      STORAGE_DIR: /app/storage
      PDF_DIR: /app/storage/pdfs
      # Set your API keys here
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    networks:
      - pge-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Ollama for Local LLM Models (Optional)
  ollama:
    image: ollama/ollama:latest
    container_name: pge-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pge-network
    # Pull models on startup (optional)
    # command: ollama pull mistral && ollama pull llava
    profiles:
      - with-ollama

networks:
  pge-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_data:
